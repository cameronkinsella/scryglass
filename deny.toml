# cargo-deny configuration. Run with: cargo deny check

[advisories]
yanked = "deny"
ignore = [
    # paste is unmaintained but frozen and compile-time only. It reaches
    # the tree through wgpu's macOS backend (metal), not anything here.
    "RUSTSEC-2024-0436",
]

[licenses]
# Everything in the tree resolves to one of these. GPL is deliberately
# absent: dual-licensed crates (like self_cell) resolve through their
# permissive branch. rawler is LGPL-2.1 and statically linked, see
# THIRD-PARTY.md for the compliance note.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "LGPL-2.1",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "NCSA",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "bzip2-1.0.6",
]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
      - run: cargo test --workspace

  deny:
    name: Licenses & advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  features:
    name: Feature builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgtk-3-dev libasound2-dev clang pkg-config
          libavcodec-dev libavformat-dev libavutil-dev
          libswscale-dev libswresample-dev libheif-dev
          libheif-plugin-x265 libheif-plugin-libde265
      - name: Minimal build and test (no default features)
        run: |
          cargo clippy --no-default-features --all-targets -- -D warnings
          cargo test --no-default-features
      - name: Video build and test (links FFmpeg libraries)
        run: cargo test --features video
      - name: HEIF tests (links system libheif)
        run: cargo test --features heif
      # clippy compiles without linking apt FFmpeg, which lacks the all-features libs.
      - name: Check and lint all features
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

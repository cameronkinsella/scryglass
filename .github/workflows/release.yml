name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Pin vcpkg so FFmpeg and libheif versions only change deliberately.
  VCPKG_COMMIT: 06a7fdd564234908731c59ac46a624f808e87b1c
  # Core LGPL FFmpeg with dav1d for AV1, plus decode-only libheif.
  # No x265, no GPL anywhere (dav1d is BSD-2).
  VCPKG_PACKAGES: ffmpeg[core,avcodec,avformat,swscale,swresample,dav1d] libheif[core]

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            triplet: x64-windows-static-md
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            triplet: x64-linux
          # The minimum macOS the binaries require comes from the pinned
          # deployment target (see vcpkg-triplets), not the image, so
          # build with the newest SDKs.
          - os: macos-26
            target: aarch64-apple-darwin
            triplet: arm64-osx
          - os: macos-26-intel
            target: x86_64-apple-darwin
            triplet: x64-osx
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Check tag matches crate version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          crate=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$tag" != "$crate" ]; then
            echo "tag v$tag does not match crate version $crate"
            exit 1
          fi

      - name: Check Windows SDK is new enough for FFmpeg
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdks = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" -Directory |
            ForEach-Object { $_.Name } | Where-Object { $_ -ge "10.0.22000.0" }
          if (-not $sdks) { throw "No Windows SDK >= 10.0.22000 on this runner" }
          "SDKs: $sdks"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ hashFiles('.github/workflows/release.yml', '.github/vcpkg-triplets/*') }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          clang pkg-config nasm libasound2-dev libgtk-3-dev

      - name: Install nasm (Intel macOS)
        if: matrix.target == 'x86_64-apple-darwin'
        run: brew install nasm

      - name: Set up pinned vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/vcpkg"
          cd "$GITHUB_WORKSPACE/vcpkg"
          git checkout "$VCPKG_COMMIT"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bootstrap-vcpkg.bat
          else
            ./bootstrap-vcpkg.sh
          fi
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> "$GITHUB_ENV"

      # Cache the built library tree, not vcpkg's ABI-keyed binary cache. The
      # ABI hash includes the runner toolchain, so the binary cache misses
      # whenever the image updates. A restored installed/ makes the install a
      # no-op regardless. Bump the key suffix when VCPKG_PACKAGES changes.
      - name: Restore prebuilt media libraries
        id: media-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: vcpkg-installed-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('.github/vcpkg-triplets/**') }}-v1

      - name: Build static media libraries
        if: steps.media-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pkgs=""
          for p in $VCPKG_PACKAGES; do pkgs="$pkgs $p:${{ matrix.triplet }}"; done
          "$VCPKG_ROOT/vcpkg" install $pkgs \
            --overlay-triplets="$GITHUB_WORKSPACE/.github/vcpkg-triplets"

      # Save only after a clean install: success() drops a partial tree if the
      # step above failed, which would poison the exact-key cache for every run.
      - name: Save prebuilt media libraries
        if: success() && steps.media-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: ${{ steps.media-cache.outputs.cache-primary-key }}

      - name: Locate libclang (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm -y --no-progress
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Build
        shell: bash
        env:
          PKG_CONFIG_ALL_STATIC: "1"
        run: |
          export MEDIA_PREFIX="$VCPKG_ROOT/installed/${{ matrix.triplet }}"
          export PKG_CONFIG_PATH="$MEDIA_PREFIX/lib/pkgconfig"

          if [ "$RUNNER_OS" = "macOS" ]; then
            # Match the pinned vcpkg deployment target.
            export MACOSX_DEPLOYMENT_TARGET=11.0

            # Do not force ffmpeg-sys-next down FFMPEG_DIR on macOS.
            # Use pkg-config metadata so static deps like dav1d are linked.
            unset FFMPEG_DIR

            if ! pkg-config --libs --static libavcodec | tr ' ' '\n' | grep -E '(^-ldav1d$|libdav1d)' >/dev/null; then
              echo "libavcodec.pc did not expose dav1d"
              pkg-config --libs --static libavcodec
              exit 1
            fi
          fi

          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            # libde265's x86 SIMD dispatch references clang's compiler-rt
            # builtins (__cpu_model), which Rust's link line never pulls in.
            rtlib="$(clang --print-resource-dir)/lib/darwin/libclang_rt.osx.a"
            export RUSTFLAGS="-C link-arg=$rtlib"
          fi

          cargo build --release --all-features --target ${{ matrix.target }}

      - name: Check for stray media DLL imports (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64"
          $deps = dumpbin /dependents "target\${{ matrix.target }}\release\scryglass.exe"
          if ($deps -match "avcodec|avformat|heif|de265|dav1d") {
            $deps
            throw "exe imports media DLLs, static link failed"
          }

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      # --no-build: package the --all-features binary the Build step produced,
      # rather than letting the xtask rebuild it with default features.
      - name: Package artifacts
        shell: bash
        run: cargo xtask package --no-build --target ${{ matrix.target }}

      - name: Upload the portable archive
        uses: actions/upload-artifact@v6
        with:
          name: scryglass-${{ matrix.target }}-portable
          path: |
            target/dist/*.zip
            target/dist/*.tar.gz
      - name: Upload the application
        uses: actions/upload-artifact@v6
        with:
          name: scryglass-${{ matrix.target }}-app
          path: |
            target/dist/*.AppImage
            target/dist/*.dmg
            target/dist/*-setup.exe

  release:
    name: Create release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
            *.AppImage
            *.dmg
            *-setup.exe

[package]
name = "scryglass"
version = "0.1.0"
edition = "2024"

[dependencies]
iced = { version = "0.14", features = ["image", "tokio"] }
anyhow = "1"
thiserror = "2"
gif = "0.14"
rfd = "0.15"
open = "5"
arboard = "3"
iced_fonts = { version = "0.3", features = ["bootstrap"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_UI_Shell", "Win32_Foundation", "Win32_System_Com", "Win32_System_Ole", "Win32_System_Registry"] }

[dev-dependencies]
tempfile = "3"
